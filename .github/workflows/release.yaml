name: release

# Release is intentionally separate from CI because it needs write permissions,
# registry publishing, and immutable semver tags that should only run on
# versioned releases.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Extract version
        id: version
        # The git tag is the single source of truth for both the image tag and
        # the packaged chart version, which keeps release assets aligned.
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Build CLI release binaries
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o dist/shukra-linux-amd64 ./cmd/shukra
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o dist/shukra-windows-amd64.exe ./cmd/shukra
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o dist/shukra-darwin-arm64 ./cmd/shukra
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/sandy001-kki/shukra-operator:${{ steps.version.outputs.version }}
            ghcr.io/sandy001-kki/shukra-operator:latest
      - uses: azure/setup-helm@v4
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - run: helm package charts/shukra-operator --version ${{ steps.version.outputs.version }} --app-version ${{ steps.version.outputs.version }}
      - run: helm push shukra-operator-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/sandy001-kki/charts
      - run: Get-FileHash shukra-operator-${{ steps.version.outputs.version }}.tgz -Algorithm SHA256 | Select-Object -ExpandProperty Hash > SHA256SUMS.txt
        shell: pwsh
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            shukra-operator-${{ steps.version.outputs.version }}.tgz
            SHA256SUMS.txt
            config/crd/bases/*.yaml
            dist/shukra-linux-amd64
            dist/shukra-windows-amd64.exe
            dist/shukra-darwin-arm64
