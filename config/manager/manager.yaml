apiVersion: v1
kind: Namespace
metadata:
  name: shukra-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shukra-operator-controller-manager
  namespace: shukra-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shukra-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shukra-operator
    spec:
      serviceAccountName: shukra-operator
      containers:
        - name: manager
          image: ghcr.io/sandy001-kki/shukra-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --max-concurrent-reconciles=5
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8443
            - name: webhook
              containerPort: 9443
            - name: probes
              containerPort: 8081
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
