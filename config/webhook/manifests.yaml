apiVersion: v1
kind: Service
metadata:
  name: shukra-operator-webhook-service
  namespace: shukra-system
spec:
  selector:
    app.kubernetes.io/name: shukra-operator
  ports:
    - name: https
      port: 443
      targetPort: 9443
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: shukra-operator-mutating
  annotations:
    cert-manager.io/inject-ca-from: shukra-system/shukra-operator-webhook-cert
webhooks:
  - name: mappenv.apps.shukra.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: shukra-operator-webhook-service
        namespace: shukra-system
        path: /mutate-apps-shukra-io-v1beta1-appenvironment
    rules:
      - apiGroups: ["apps.shukra.io"]
        apiVersions: ["v1beta1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["appenvironments"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: shukra-operator-validating
  annotations:
    cert-manager.io/inject-ca-from: shukra-system/shukra-operator-webhook-cert
webhooks:
  - name: vappenv.apps.shukra.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: shukra-operator-webhook-service
        namespace: shukra-system
        path: /validate-apps-shukra-io-v1beta1-appenvironment
    rules:
      - apiGroups: ["apps.shukra.io"]
        apiVersions: ["v1beta1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["appenvironments"]
