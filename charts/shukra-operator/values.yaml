# Default values for the Shukra Operator chart.
# These defaults work for local development, but production clusters should
# review image pinning, reconcile concurrency, resource requests, watch scope,
# and cert-manager issuer settings explicitly.
image:
  repository: ghcr.io/sandy001-kki/shukra-operator
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 1
leaderElection:
  enabled: true
  namespace: shukra-system
watchNamespace: ""
maxConcurrentReconciles: 5
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
certmanager:
  enabled: true
  issuerKind: Issuer
  issuerName: shukra-selfsigned-issuer
metrics:
  enabled: true
  port: 8443
serviceAccount:
  create: true
  name: shukra-operator
bridge:
  enabled: false
  replicaCount: 1
  aionosEndpoint: ""
  apiKey: ""
  image:
    repository: ghcr.io/sandy001-kki/shukra-operator
    tag: latest
    pullPolicy: IfNotPresent
  grpcPort: 50051
  metricsPort: 8080
  tls:
    secretName: shukra-bridge-tls
    clientCASecretName: shukra-bridge-tls
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
shadow:
  namespace: aionos-shadow
