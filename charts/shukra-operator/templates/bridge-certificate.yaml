{{- if and .Values.bridge.enabled .Values.certmanager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: shukra-bridge-cert
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.bridge.tls.secretName }}
  dnsNames:
    - shukra-bridge.{{ .Release.Namespace }}.svc
    - shukra-bridge.{{ .Release.Namespace }}.svc.cluster.local
  usages:
    - server auth
    - client auth
  issuerRef:
    kind: {{ .Values.certmanager.issuerKind }}
    name: {{ .Values.certmanager.issuerName }}
{{- end }}
