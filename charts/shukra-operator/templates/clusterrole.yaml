apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shukra-operator
rules:
  # The operator needs full lifecycle access to its CRD plus status/finalizer updates.
  - apiGroups: ["apps.shukra.io"]
    resources: ["appenvironments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps.shukra.io"]
    resources: ["appenvironments/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps.shukra.io"]
    resources: ["appenvironments/finalizers"]
    verbs: ["update"]
  # Deployments carry the application workload lifecycle managed by AppEnvironment.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Services and ConfigMaps are created and updated by the operator.
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets are reference-only. The operator never creates or mutates them.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events only need create and patch because the recorder appends lifecycle history.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leases are required for controller-runtime leader election in HA deployments.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
