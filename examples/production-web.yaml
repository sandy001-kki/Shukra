apiVersion: apps.shukra.io/v1beta1
kind: AppEnvironment
metadata:
  name: production-web
  namespace: default
spec:
  app:
    image: nginx:1.27
    containerPort: 80
    replicas: 3
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
  service:
    enabled: true
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    host: production-web.example.com
    path: /
    pathType: Prefix
    className: nginx
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  backup:
    enabled: true
    schedule: "0 2 * * *"
    destination: s3://company-backups/production-web
    retentionPolicy: 30d
  security:
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
