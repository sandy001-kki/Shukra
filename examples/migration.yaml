apiVersion: apps.shukra.io/v1beta1
kind: AppEnvironment
metadata:
  name: migration-app
spec:
  app:
    image: ghcr.io/sandy001-kki/sample:1.0.0
    resources:
      requests: {cpu: 100m, memory: 128Mi}
      limits: {cpu: 500m, memory: 512Mi}
  database:
    enabled: true
    mode: external
    secretRef: migration-db
    schemaName: app
  migration:
    enabled: true
    image: ghcr.io/sandy001-kki/migrator:1.0.0
    migrationID: v1-initial-schema
    command: ["./migrate"]
    args: ["up"]
