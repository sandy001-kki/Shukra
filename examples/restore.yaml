apiVersion: apps.shukra.io/v1beta1
kind: AppEnvironment
metadata:
  name: restore-app
spec:
  app:
    image: nginx:1.27
    containerPort: 80
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
    resources:
      requests: {cpu: 100m, memory: 128Mi}
      limits: {cpu: 500m, memory: 512Mi}
  backup:
    enabled: true
    schedule: "0 */6 * * *"
    destination: s3://backups/restore-app
    retentionPolicy: 30d
  restore:
    enabled: true
    image: busybox:1.36
    # For a local demo, the restore builder executes `source` through `/bin/sh -c`.
    # In production, use a restore image whose entrypoint understands your real backup source.
    source: "echo restoring backup restore-20240101-001 && sleep 5"
    triggerNonce: restore-20240101-001
    mode: full
